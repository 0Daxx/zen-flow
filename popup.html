<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guidance Guru</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">🧘</span>
        <h1>Guidance Guru</h1>
      </div>
      <button id="settings-btn" class="icon-btn" title="Settings">
        ⚙️
      </button>
    </header>

    <!-- Emotion Status Widget -->
    <section class="emotion-widget">
      <div class="widget-header">
        <h2>Your Current State</h2>
        <span id="emotion-indicator" class="emotion-indicator neutral"></span>
      </div>
      <div class="emotion-display">
        <div id="emotion-icon" class="emotion-icon-large">😐</div>
        <div id="emotion-text" class="emotion-text">Neutral</div>
        <div id="emotion-confidence" class="emotion-confidence">--%</div>
      </div>
      <div class="emotion-color-bar" id="emotion-color-bar"></div>
    </section>

    <!-- Posture Score Widget -->
    <section class="posture-widget">
      <div class="widget-header">
        <h2>Posture Score</h2>
        <span id="posture-status" class="posture-status good">Good</span>
      </div>
      <div class="posture-display">
        <div class="circular-progress">
          <svg viewBox="0 0 120 120" class="progress-svg">
            <circle class="progress-bg" cx="60" cy="60" r="52"></circle>
            <circle id="posture-progress" class="progress-bar" cx="60" cy="60" r="52"></circle>
          </svg>
          <div id="posture-score" class="progress-text">--</div>
        </div>
      </div>
    </section>

    <!-- Quick Actions -->
    <section class="quick-actions">
      <button id="break-now-btn" class="action-btn primary">
        <span class="btn-icon">⏸️</span>
        Take a Break
      </button>
      <button id="meditate-btn" class="action-btn secondary">
        <span class="btn-icon">🧘</span>
        Meditate
      </button>
    </section>

    <!-- Today's Summary -->
    <section class="summary-widget">
      <h2>Today's Overview</h2>
      <div class="summary-grid">
        <div class="summary-item">
          <div class="summary-value" id="stress-index">--</div>
          <div class="summary-label">Stress Index</div>
        </div>
        <div class="summary-item">
          <div class="summary-value" id="avg-posture">--</div>
          <div class="summary-label">Avg Posture</div>
        </div>
        <div class="summary-item">
          <div class="summary-value" id="breaks-taken">--</div>
          <div class="summary-label">Breaks Taken</div>
        </div>
        <div class="summary-item">
          <div class="summary-value" id="active-site">--</div>
          <div class="summary-label">Active Site</div>
        </div>
      </div>
    </section>

    <!-- Current Website -->
    <section class="website-tracker">
      <h2>Current Activity</h2>
      <div class="website-info">
        <span id="current-domain" class="domain-name">Not tracking</span>
        <span id="session-time" class="session-time">00:00</span>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <button id="dashboard-btn" class="footer-btn">
        📊 View Full Dashboard
      </button>
      <div class="status-indicator">
        <span id="detection-status" class="status-dot active"></span>
        <span id="status-text">Active</span>
      </div>
    </footer>

    <!-- Settings Modal (hidden by default) -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Settings</h2>
          <button id="close-settings" class="close-btn">×</button>
        </div>
        <div class="modal-body">
          <div class="setting-item">
            <label for="enable-emotion">Enable Emotion Detection</label>
            <input type="checkbox" id="enable-emotion" checked>
          </div>
          <div class="setting-item">
            <label for="enable-posture">Enable Posture Detection</label>
            <input type="checkbox" id="enable-posture" checked>
          </div>
          <div class="setting-item">
            <label for="enable-breaks">Enable Break Notifications</label>
            <input type="checkbox" id="enable-breaks" checked>
          </div>
          <div class="setting-item">
            <label for="enable-tracking">Enable Website Tracking</label>
            <input type="checkbox" id="enable-tracking" checked>
          </div>
          <div class="setting-item">
            <label for="meditation-url">Meditation App URL</label>
            <input type="text" id="meditation-url" placeholder="https://your-meditation-app.com">
          </div>
        </div>
        <div class="modal-footer">
          <button id="save-settings" class="action-btn primary">Save Settings</button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
